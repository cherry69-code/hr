<div class="space-y-6">
  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold text-[#0F172A]">Attendance Locations</h1>
    <button (click)="openCreate()" class="bg-[#16A34A] text-white px-4 py-2 rounded-xl font-medium hover:bg-[#15803d] transition">
      Add Location
    </button>
  </div>

  <div *ngIf="loading" class="flex justify-center py-10">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#16A34A]"></div>
  </div>

  <div *ngIf="!loading" class="bg-white rounded-2xl shadow overflow-x-auto">
    <table class="w-full text-left">
      <thead class="bg-gray-100">
        <tr>
          <th class="p-3">Name</th>
          <th class="p-3">Latitude</th>
          <th class="p-3">Longitude</th>
          <th class="p-3">Radius (m)</th>
          <th class="p-3">Status</th>
          <th class="p-3">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let loc of locations" class="border-t hover:bg-gray-50 transition-colors">
          <td class="p-3 font-medium text-[#0F172A]">{{ loc.name }}</td>
          <td class="p-3 text-gray-600">{{ loc.latitude }}</td>
          <td class="p-3 text-gray-600">{{ loc.longitude }}</td>
          <td class="p-3 text-gray-600">{{ loc.radius || 20 }}</td>
          <td class="p-3">
            <span class="px-2 py-1 rounded-full text-xs font-bold uppercase"
              [ngClass]="loc.active ? 'bg-green-100 text-green-700' : 'bg-gray-200 text-gray-700'">
              {{ loc.active ? 'Active' : 'Inactive' }}
            </span>
          </td>
          <td class="p-3 space-x-3">
            <button (click)="openEdit(loc)" class="text-blue-600 hover:text-blue-800 font-medium">Edit</button>
            <button (click)="delete(loc)" class="text-red-600 hover:text-red-800 font-medium">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>

    <div *ngIf="locations.length === 0" class="p-10 text-center text-gray-500">
      No locations yet. Add your first attendance location.
    </div>
  </div>

  <div *ngIf="showModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-xl p-6">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-[#0F172A]">{{ isEditing ? 'Edit Location' : 'Add Location' }}</h2>
        <button (click)="closeModal()" class="text-slate-400 hover:text-slate-600">✕</button>
      </div>

      <form (ngSubmit)="save()" class="space-y-4">
        <div>
          <label class="text-sm font-medium text-slate-700">Name</label>
          <input [(ngModel)]="form.name" name="name" class="w-full border rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-[#16A34A]" required />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="text-sm font-medium text-slate-700">Latitude</label>
            <input type="number" step="any" [(ngModel)]="form.latitude" name="latitude" class="w-full border rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-[#16A34A]" required />
          </div>
          <div>
            <label class="text-sm font-medium text-slate-700">Longitude</label>
            <input type="number" step="any" [(ngModel)]="form.longitude" name="longitude" class="w-full border rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-[#16A34A]" required />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="text-sm font-medium text-slate-700">Radius (meters)</label>
            <input type="number" [(ngModel)]="form.radius" name="radius" class="w-full border rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-[#16A34A]" />
          </div>
          <div class="flex items-end">
            <label class="flex items-center gap-2 text-sm font-medium text-slate-700">
              <input type="checkbox" [(ngModel)]="form.active" name="active" />
              Active
            </label>
          </div>
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t">
          <button type="button" (click)="closeModal()" class="px-4 py-2 border rounded-xl hover:bg-slate-50 transition">Cancel</button>
          <button type="submit" class="bg-[#16A34A] text-white px-6 py-2 rounded-xl font-medium hover:bg-[#15803d] transition">
            Save
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
