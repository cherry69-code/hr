<div class="max-w-4xl mx-auto bg-white p-6 rounded-2xl shadow">
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-xl font-bold text-[#0F172A]">My Documents</h2>
    <button (click)="load()" class="border px-4 py-2 rounded-xl hover:bg-slate-50 transition">Refresh</button>
  </div>

  <div *ngIf="loading" class="text-sm text-gray-500">Loading...</div>
  <div *ngIf="error" class="bg-red-50 text-red-700 border border-red-200 p-3 rounded-xl text-sm">
    {{ error }}
  </div>

  <div *ngIf="!loading && !error" class="space-y-3">
    <div *ngFor="let d of docs" class="border rounded-xl p-4 flex items-center justify-between">
      <div>
        <div class="font-semibold text-sm capitalize">{{ d.documentType }}</div>
        <div class="text-xs text-gray-500">{{ d.createdAt | date:'medium' }}</div>
      </div>
      <a class="text-blue-600 hover:text-blue-800 font-medium text-sm" [href]="getDownloadUrl(d.fileUrl)" target="_blank">
        Download
      </a>
    </div>
    <div *ngIf="docs.length === 0" class="text-sm text-gray-500">No documents available.</div>
  </div>
</div>
