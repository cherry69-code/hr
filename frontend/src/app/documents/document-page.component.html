<div class="p-4 md:p-6 space-y-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-[#0F172A]">Documents</h1>
  </div>

  <div *ngIf="loading" class="flex justify-center py-12">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-600"></div>
  </div>

  <div *ngIf="!loading && documents.length === 0" class="bg-white p-12 rounded-xl shadow text-center">
    <p class="text-slate-500">No documents found.</p>
  </div>

  <div *ngIf="!loading && documents.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let doc of documents" class="bg-white p-6 rounded-xl shadow hover:shadow-md transition-shadow">
      <div class="flex justify-between items-start mb-4">
        <div class="p-2 bg-green-50 rounded-lg">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
        </div>
        <span class="px-2 py-1 bg-green-100 text-green-800 rounded-full text-xs font-medium uppercase">
          {{ doc.status }}
        </span>
      </div>
      <h3 class="font-bold text-[#0F172A] capitalize">{{ doc.type.replace('_', ' ') }}</h3>
      <p class="text-sm text-slate-500 mb-4">Uploaded: {{ doc.uploadedAt | date }}</p>
      <button (click)="downloadDoc(doc.fileUrl)" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition-colors text-sm flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
        </svg>
        Download PDF
      </button>
    </div>
  </div>
</div>
