<div class="bg-white p-6 rounded-2xl shadow">

  <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
    <h2 class="text-xl font-bold text-[#0F172A]">
      Payroll
    </h2>

    <div class="flex items-center gap-2" *ngIf="role !== 'employee'">
      <select [(ngModel)]="selectedMonth" class="border rounded-xl px-3 py-2 outline-none focus:ring-2 focus:ring-[#16A34A]">
        <option *ngFor="let m of months" [value]="m.value">{{ m.name }}</option>
      </select>
      <input type="number" [(ngModel)]="selectedYear" class="border rounded-xl px-3 py-2 w-24 outline-none focus:ring-2 focus:ring-[#16A34A]">
    </div>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full text-left">
      <thead class="bg-gray-100">
        <tr>
          <th class="p-3 font-semibold text-[#0F172A]">Employee</th>
          <th class="p-3 font-semibold text-[#0F172A]">Month</th>
          <th class="p-3 font-semibold text-[#0F172A]">Net Pay</th>
          <th class="p-3 font-semibold text-[#0F172A]">Actions</th>
        </tr>
      </thead>

      <tbody>
        <!-- Admin View: List of all employee payrolls -->
        <ng-container *ngIf="role !== 'employee'">
          <tr *ngFor="let emp of employees" class="border-t hover:bg-gray-50 transition-colors">
            <td class="p-3 font-medium text-gray-800">
              {{ emp.fullName }}
              <div class="text-xs text-gray-500 font-normal">{{ emp.designation }}</div>
            </td>
            <td class="p-3 text-gray-600">{{ selectedMonth }}/{{ selectedYear }}</td>
            <td class="p-3 font-semibold text-[#16A34A]">—</td>
            <td class="p-3">
              <button (click)="generatePayslip(emp._id)" [disabled]="loading" class="bg-[#16A34A] text-white px-4 py-1 rounded-lg font-medium hover:bg-[#15803d] transition shadow-sm disabled:opacity-50">
                {{ loading ? 'Generating...' : 'Generate & Download' }}
              </button>
            </td>
          </tr>
        </ng-container>

        <!-- Employee View: List of their own payslips -->
        <ng-container *ngIf="role === 'employee'">
          <tr *ngFor="let slip of payslips" class="border-t hover:bg-gray-50 transition-colors">
            <td class="p-3 font-medium text-gray-800">{{ authService.currentUserValue.fullName }}</td>
            <td class="p-3 text-gray-600">{{ slip.month }}/{{ slip.year }}</td>
            <td class="p-3 font-semibold text-[#16A34A]">₹{{ slip.netSalary }}</td>
            <td class="p-3">
              <a *ngIf="slip.pdfUrl" [href]="slip.pdfUrl" target="_blank" class="text-blue-600 hover:text-blue-800 font-medium underline">
                Download PDF
              </a>
              <span *ngIf="!slip.pdfUrl" class="text-gray-400">Processing...</span>
            </td>
          </tr>
        </ng-container>
      </tbody>
    </table>
  </div>

  <p *ngIf="(role === 'employee' && payslips.length === 0) || (role !== 'employee' && employees.length === 0)"
     class="text-slate-500 text-center py-8">
    No payroll records found.
  </p>

</div>
