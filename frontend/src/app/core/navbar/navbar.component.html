<header class="bg-white shadow px-6 py-4 flex justify-between items-center">

  <div class="text-xl font-semibold text-[#0F172A]">
    HR Management System
  </div>

  <div class="flex items-center space-x-4">
    <a routerLink="/employees" class="text-gray-600 font-medium hover:text-[#16A34A] transition" *ngIf="['admin', 'hr', 'manager'].includes(role)">Employees</a>
    <a routerLink="/departments" class="text-gray-600 font-medium hover:text-[#16A34A] transition" *ngIf="role === 'admin'">Departments</a>

    <span class="text-gray-600 capitalize font-medium">{{ role }}</span>
    <a routerLink="/profile" class="cursor-pointer">
      <div class="w-10 h-10 bg-[#16A34A] rounded-full flex items-center justify-center text-white font-bold text-lg shadow-sm hover:ring-2 hover:ring-offset-2 hover:ring-[#16A34A] transition">
        {{ initial }}
      </div>
    </a>
  </div>

</header>
