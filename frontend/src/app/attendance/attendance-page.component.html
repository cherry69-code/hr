<div class="max-w-md mx-auto" *ngIf="!isAdmin">

  <div class="bg-white p-8 rounded-2xl shadow text-center">

    <h2 class="text-xl font-bold text-[#0F172A] mb-4">
      Mark Attendance
    </h2>

    <div *ngIf="statusMessage" class="mb-4 p-3 rounded-xl text-sm font-medium"
      [ngClass]="statusMessage.includes('successfully') ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'">
      {{ statusMessage }}
    </div>

    <button (click)="markAttendance()" [disabled]="loading"
      class="w-full bg-[#16A34A] text-white py-3 rounded-xl mb-3 font-bold hover:bg-[#15803d] transition disabled:opacity-50">
      {{ loading ? 'Processing...' : 'Check In' }}
    </button>

    <button (click)="checkOut()" [disabled]="loading"
      class="w-full bg-[#0F172A] text-white py-3 rounded-xl font-bold hover:bg-slate-800 transition disabled:opacity-50">
      Check Out
    </button>

  </div>

  <!-- Recent History (Added for better context) -->
  <div class="mt-8 bg-white p-6 rounded-2xl shadow">
    <h3 class="font-bold text-[#0F172A] mb-4">Recent Attendance</h3>
    <div class="space-y-3">
      <div *ngFor="let record of attendanceRecords.slice(0, 5)" class="flex justify-between items-center text-sm border-b pb-2 last:border-0">
        <div>
          <p class="font-medium text-gray-800">{{ record.date | date:'mediumDate' }}</p>
          <p class="text-xs text-gray-500">{{ record.checkInTime | date:'shortTime' }} - {{ record.checkOutTime ? (record.checkOutTime | date:'shortTime') : 'Active' }}</p>
        </div>
        <span class="px-2 py-1 rounded-full text-[10px] font-bold uppercase"
          [ngClass]="record.status === 'Present' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'">
          {{ record.status }}
        </span>
      </div>
    </div>
  </div>

</div>

<div *ngIf="isAdmin">
  <app-locations-page></app-locations-page>
</div>
