<div class="bg-[#F8FAFC] min-h-screen flex items-center justify-center p-4">
  <div class="bg-white shadow-xl rounded-2xl w-full max-w-md p-8">
    <h2 class="text-2xl font-bold text-[#0F172A] text-center mb-6">
      Set New Password
    </h2>

    <form class="space-y-4" (ngSubmit)="submit()">
      <input type="password" placeholder="New Password" name="password"
        [(ngModel)]="password" required
        class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-green-600 outline-none">

      <input type="password" placeholder="Confirm Password" name="confirmPassword"
        [(ngModel)]="confirmPassword" required
        class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-green-600 outline-none">

      <div *ngIf="error" class="text-red-600 text-sm text-center">{{ error }}</div>
      <div *ngIf="success" class="text-green-700 text-sm text-center">{{ success }}</div>

      <button type="submit" [disabled]="loading"
        class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition disabled:opacity-50">
        {{ loading ? 'Saving...' : 'Update Password' }}
      </button>
    </form>
  </div>
</div>
