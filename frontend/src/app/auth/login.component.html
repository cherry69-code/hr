<div class="bg-[#F8FAFC] min-h-screen flex items-center justify-center p-4">
  <div class="bg-white shadow-xl rounded-2xl w-full max-w-md p-8">
    <h2 class="text-2xl font-bold text-[#0F172A] text-center mb-6">
      PropNinja HRMS
    </h2>

    <form class="space-y-4" (ngSubmit)="onSubmit()">
      <div>
        <input type="email" name="email" placeholder="Email"
          [(ngModel)]="credentials.email" required
          class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-green-600 outline-none">
      </div>

      <div>
        <input type="password" name="password" placeholder="Password"
          [(ngModel)]="credentials.password" required
          class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-green-600 outline-none">
      </div>

      <div *ngIf="error" class="text-red-500 text-sm text-center">
        {{ error }}
      </div>

      <button type="submit" [disabled]="loading"
        class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition disabled:opacity-50">
        {{ loading ? 'Signing in...' : 'Login' }}
      </button>
    </form>
  </div>
</div>
