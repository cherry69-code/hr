<div class="min-h-screen p-4 flex items-start justify-end" [ngStyle]="bgStyle">
  <div class="bg-white/95 backdrop-blur-sm shadow-xl rounded-2xl w-full max-w-md p-8 mt-6 mr-6">
    <h2 class="text-2xl font-bold text-[#0F172A] text-center mb-6">
      PropNinja HRMS
    </h2>

    <form class="space-y-4" (ngSubmit)="onSubmit()">
      <div>
        <input type="text" name="loginId" placeholder="Email or Employee Code"
          [(ngModel)]="credentials.loginId" required
          class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-green-600 outline-none">
      </div>

      <div>
        <input type="password" name="password" placeholder="Password"
          [(ngModel)]="credentials.password" required
          class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-green-600 outline-none">
      </div>

      <div *ngIf="error" class="text-red-500 text-sm text-center">
        {{ error }}
      </div>

      <button type="submit" [disabled]="loading"
        class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition disabled:opacity-50">
        {{ loading ? 'Signing in...' : 'Login' }}
      </button>
    </form>
  </div>
</div>
