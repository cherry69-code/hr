<div class="bg-white p-6 rounded-2xl shadow">
  
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-xl font-bold text-[#0F172A]">Departments</h2>
    <button (click)="openAddModal()" class="bg-[#16A34A] text-white px-4 py-2 rounded-xl font-medium hover:bg-[#15803d] transition shadow-sm">
      Add Department
    </button>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
      <thead class="bg-gray-100">
        <tr>
          <th class="p-3 font-semibold text-[#0F172A]">Name</th>
          <th class="p-3 font-semibold text-[#0F172A]">Description</th>
          <th class="p-3 font-semibold text-[#0F172A]">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let dept of departments" class="border-t hover:bg-gray-50 transition-colors">
          <td class="p-3 font-medium text-[#0F172A]">{{ dept.name }}</td>
          <td class="p-3 text-gray-600">{{ dept.description || '-' }}</td>
          <td class="p-3">
            <button (click)="openEditModal(dept)" class="text-blue-600 hover:text-blue-800 font-medium transition">Edit</button>
            <button (click)="deleteDepartment(dept._id)" class="text-red-600 hover:text-red-800 font-medium ml-3 transition">Delete</button>
          </td>
        </tr>
        <tr *ngIf="departments.length === 0 && !loading">
          <td colspan="3" class="p-4 text-center text-gray-500">No departments found.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal -->
  <div *ngIf="showModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6">
      <h2 class="text-xl font-bold text-[#0F172A] mb-4">{{ isEditing ? 'Edit Department' : 'Add Department' }}</h2>
      
      <form (ngSubmit)="saveDepartment()" class="space-y-4">
        <div>
          <label class="text-sm font-medium text-slate-700">Name</label>
          <input type="text" [(ngModel)]="departmentForm.name" name="name" required class="w-full border rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-[#16A34A]">
        </div>
        <div>
          <label class="text-sm font-medium text-slate-700">Description</label>
          <textarea [(ngModel)]="departmentForm.description" name="description" class="w-full border rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-[#16A34A]"></textarea>
        </div>
        <div class="flex justify-end gap-3 pt-4 border-t">
          <button type="button" (click)="showModal = false" class="px-4 py-2 border rounded-xl hover:bg-slate-50 transition">Cancel</button>
          <button type="submit" class="bg-[#16A34A] text-white px-6 py-2 rounded-xl font-medium hover:bg-[#15803d] transition">
            {{ isEditing ? 'Update' : 'Create' }}
          </button>
        </div>
      </form>
    </div>
  </div>

</div>
