worker_processes auto;
worker_rlimit_nofile 200000;

events {
  worker_connections 8192;
  multi_accept on;
}

http {
  server_tokens off;
  log_format main '$remote_addr - $request_id [$time_local] "$request" $status $body_bytes_sent $request_time';
  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 10000;
  client_body_timeout 15s;
  client_header_timeout 15s;
  send_timeout 15s;
  reset_timedout_connection on;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_min_length 1024;
  gzip_comp_level 5;
  gzip_types application/json text/plain text/css application/javascript application/xml;

  limit_req_zone $binary_remote_addr zone=perip:10m rate=30r/s;

  upstream auth_service { server auth-service:3001; keepalive 64; }
  upstream employee_service { server employee-service:3002; keepalive 64; }
  upstream attendance_service { server attendance-service:3003; keepalive 64; }
  upstream payroll_service { server payroll-service:3004; keepalive 64; }
  upstream notification_service { server notification-service:3005; keepalive 64; }
  upstream ws_gateway { server ws-gateway:3006; keepalive 64; }
  upstream admin_service { server admin-service:3007; keepalive 64; }

  server {
    listen 8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    proxy_set_header True-Client-IP $http_true_client_ip;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'" always;

    location = /health { return 200 "ok"; }

    location ^~ /api/auth {
      limit_req zone=perip burst=60 nodelay;
      rewrite ^/api/auth/?(.*)$ /$1 break;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_pass http://auth_service;
    }

    location ^~ /api/employees {
      limit_req zone=perip burst=60 nodelay;
      rewrite ^/api/employees/?(.*)$ /$1 break;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_pass http://employee_service;
    }

    location ^~ /api/attendance {
      limit_req zone=perip burst=60 nodelay;
      rewrite ^/api/attendance/?(.*)$ /$1 break;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_pass http://attendance_service;
    }

    location ^~ /api/payroll {
      limit_req zone=perip burst=60 nodelay;
      rewrite ^/api/payroll/?(.*)$ /$1 break;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_pass http://payroll_service;
    }

    location ^~ /api/notifications {
      limit_req zone=perip burst=60 nodelay;
      rewrite ^/api/notifications/?(.*)$ /$1 break;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_pass http://notification_service;
    }

    location ^~ /api/admin {
      limit_req zone=perip burst=60 nodelay;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_pass http://admin_service;
    }

    location /ws/ {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      rewrite ^/ws/(.*)$ /$1 break;
      proxy_pass http://ws_gateway;
    }
  }
}
