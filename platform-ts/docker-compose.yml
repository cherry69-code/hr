services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro

  pgbouncer:
    image: bitnami/pgbouncer:1.22
    environment:
      PGBOUNCER_DATABASE: ${POSTGRES_DB}
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: ${POSTGRES_USER}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 1000
      PGBOUNCER_DEFAULT_POOL_SIZE: 50
      PGBOUNCER_IGNORE_STARTUP_PARAMETERS: extra_float_digits,options
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      - auth-service
      - employee-service
      - attendance-service
      - payroll-service
      - notification-service
      - ws-gateway
      - admin-service

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment:
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      READ_DATABASE_URL: ${READ_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      - pgbouncer
      - redis

  employee-service:
    build:
      context: .
      dockerfile: services/employee-service/Dockerfile
    environment:
      PORT: 3002
      DATABASE_URL: ${DATABASE_URL}
      READ_DATABASE_URL: ${READ_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      - pgbouncer
      - redis

  attendance-service:
    build:
      context: .
      dockerfile: services/attendance-service/Dockerfile
    environment:
      PORT: 3003
      DATABASE_URL: ${DATABASE_URL}
      READ_DATABASE_URL: ${READ_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      - pgbouncer
      - redis

  payroll-service:
    build:
      context: .
      dockerfile: services/payroll-service/Dockerfile
    environment:
      PORT: 3004
      DATABASE_URL: ${DATABASE_URL}
      READ_DATABASE_URL: ${READ_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      - pgbouncer
      - redis

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    environment:
      PORT: 3005
      REDIS_URL: ${REDIS_URL}
    depends_on:
      - redis

  ws-gateway:
    build:
      context: .
      dockerfile: services/ws-gateway/Dockerfile
    environment:
      PORT: 3006
      REDIS_URL: ${REDIS_URL}
    depends_on:
      - redis

  admin-service:
    build:
      context: .
      dockerfile: services/admin-service/Dockerfile
    environment:
      PORT: 3007
      DATABASE_URL: ${DATABASE_URL}
      READ_DATABASE_URL: ${READ_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
    depends_on:
      - pgbouncer
      - redis

  attendance-worker:
    build:
      context: .
      dockerfile: workers/attendance-worker/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      READ_DATABASE_URL: ${READ_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      - pgbouncer
      - redis

  payroll-worker:
    build:
      context: .
      dockerfile: workers/payroll-worker/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      READ_DATABASE_URL: ${READ_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      - pgbouncer
      - redis

  usage-worker:
    build:
      context: .
      dockerfile: workers/usage-worker/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      - pgbouncer
      - redis

  notification-worker:
    build:
      context: .
      dockerfile: workers/notification-worker/Dockerfile
    environment:
      REDIS_URL: ${REDIS_URL}
    depends_on:
      - redis

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "${GATEWAY_PORT}:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - employee-service
      - attendance-service
      - payroll-service
      - notification-service
      - ws-gateway
      - admin-service

volumes:
  pgdata:
