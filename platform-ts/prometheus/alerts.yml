groups:
  - name: hrms.rules
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service down: {{ $labels.job }}"

      - alert: High5xxRate
        expr: (sum(rate(http_requests_total{status=~"5.."}[5m])) by (service) / sum(rate(http_requests_total[5m])) by (service)) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx rate ({{ $labels.service }})"

      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_ms_bucket[5m])) by (le, service)) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency ({{ $labels.service }})"

